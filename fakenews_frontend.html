<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Fake News Detector</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/><style>:root {
    --bg: #080b14;
    --surface: #0f1423;
    --surface2: #161d30;
    --border: #1e2840;
    --accent: #e63946;
    --green: #2ec4b6;
    --yellow: #f4c842;
    --text: #dde3f0;
    --muted: #5a6a8a;
}

*,
*::before,
*::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}


/* ── HEADER ── */

header {
    width: 100%;
    padding: 64px 24px 52px;
    text-align: center;
    position: relative;
    overflow: hidden;
}

header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 55% at 50% -10%, rgba(230, 57, 70, .2) 0%, transparent 70%), radial-gradient(ellipse 40% 30% at 20% 110%, rgba(58, 134, 255, .1) 0%, transparent 60%);
    pointer-events: none;
}

.eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.eyebrow::before,
.eyebrow::after {
    content: '';
    width: 32px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent));
}

.eyebrow::after {
    transform: scaleX(-1);
}

h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 10vw, 7rem);
    letter-spacing: .06em;
    line-height: .95;
    color: var(--text);
    position: relative;
    z-index: 1;
}

h1 em {
    font-style: normal;
    color: transparent;
    -webkit-text-stroke: 1.5px var(--accent);
}

.subtitle {
    margin-top: 18px;
    font-size: .95rem;
    color: var(--muted);
    letter-spacing: .02em;
    position: relative;
    z-index: 1;
}

.divider {
    width: 100%;
    max-width: 700px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border) 30%, var(--border) 70%, transparent);
    margin: 40px auto 0;
}


/* ── MAIN ── */

main {
    width: 100%;
    max-width: 700px;
    padding: 48px 24px 100px;
    position: relative;
    z-index: 1;
}


/* ── INPUT CARD ── */

.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(230, 57, 70, .5), transparent);
}

.input-label {
    font-size: .76rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.input-label::before {
    content: '//';
    color: var(--accent);
}

textarea {
    width: 100%;
    min-height: 180px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .93rem;
    line-height: 1.7;
    padding: 16px 18px;
    resize: vertical;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
}

textarea:focus {
    border-color: rgba(230, 57, 70, .5);
    box-shadow: 0 0 0 3px rgba(230, 57, 70, .07);
}

textarea::placeholder {
    color: #2a3550;
}

.bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    flex-wrap: wrap;
    gap: 12px;
}

#char-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem;
    color: var(--muted);
}

.btn-analyze {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: .12em;
    padding: 13px 30px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 4px 24px rgba(230, 57, 70, .35), inset 0 1px 0 rgba(255, 255, 255, .1);
    position: relative;
    overflow: hidden;
}

.btn-analyze::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255, 255, 255, .08) 0%, transparent 100%);
}

.btn-analyze:hover {
    background: #c9313d;
    box-shadow: 0 6px 32px rgba(230, 57, 70, .5);
    transform: translateY(-1px);
}

.btn-analyze:active {
    transform: none;
}

.btn-analyze:disabled {
    opacity: .45;
    cursor: not-allowed;
    transform: none;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

.spin-ring {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255, 255, 255, .3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .65s linear infinite;
    display: none;
}

.spinning .spin-ring {
    display: block;
}

.spinning #btn-label {
    display: none;
}


/* ── RESULT ── */

#result {
    margin-top: 24px;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    display: none;
    animation: rise .45s cubic-bezier(.22, 1, .36, 1);
}

@keyframes rise {
    from {
        opacity: 0;
        transform: translateY(12px)
    }
    to {
        opacity: 1;
        transform: none
    }
}

.result-top {
    padding: 22px 26px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
}

.result-top.fake {
    background: linear-gradient(135deg, rgba(230, 57, 70, .12), rgba(230, 57, 70, .05));
    border-bottom: 1px solid rgba(230, 57, 70, .2);
}

.result-top.real {
    background: linear-gradient(135deg, rgba(46, 196, 182, .1), rgba(46, 196, 182, .04));
    border-bottom: 1px solid rgba(46, 196, 182, .2);
}

.result-top.uncertain {
    background: linear-gradient(135deg, rgba(244, 200, 66, .08), rgba(244, 200, 66, .03));
    border-bottom: 1px solid rgba(244, 200, 66, .2);
}

.verdict {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: .12em;
    display: flex;
    align-items: center;
    gap: 12px;
}

.verdict-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%,
    100% {
        opacity: 1;
        transform: scale(1)
    }
    50% {
        opacity: .5;
        transform: scale(1.3)
    }
}

.fake .verdict-dot {
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
}

.real .verdict-dot {
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
}

.uncertain .verdict-dot {
    background: var(--yellow);
    box-shadow: 0 0 10px var(--yellow);
}

.fake .verdict {
    color: var(--accent);
}

.real .verdict {
    color: var(--green);
}

.uncertain .verdict {
    color: var(--yellow);
}

.model-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
    letter-spacing: .08em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: right;
}

.result-body {
    padding: 22px 26px;
    background: var(--surface);
}

.conf-row {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .08em;
}

.conf-track {
    height: 5px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 22px;
}

.conf-bar {
    height: 100%;
    border-radius: 3px;
    width: 0;
    transition: width 1.1s cubic-bezier(.4, 0, .2, 1);
}

.fake .conf-bar {
    background: linear-gradient(90deg, #e63946, #ff8a8a);
}

.real .conf-bar {
    background: linear-gradient(90deg, #2ec4b6, #7de8e2);
}

.uncertain .conf-bar {
    background: linear-gradient(90deg, #f4c842, #fad97a);
}

.analysis-text {
    font-size: .9rem;
    line-height: 1.75;
    color: #8fa0c0;
    border-left: 2px solid var(--border);
    padding-left: 14px;
    margin-bottom: 20px;
}

.tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.tag {
    font-size: .7rem;
    font-family: 'JetBrains Mono', monospace;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid;
    letter-spacing: .05em;
}

.tag.warn {
    border-color: rgba(230, 57, 70, .35);
    color: #e07878;
    background: rgba(230, 57, 70, .07);
}

.tag.ok {
    border-color: rgba(46, 196, 182, .3);
    color: #4fcfc6;
    background: rgba(46, 196, 182, .07);
}

.tag.neutral {
    border-color: var(--border);
    color: var(--muted);
    background: transparent;
}

footer {
    text-align: center;
    padding: 0 24px 40px;
    font-size: .7rem;
    color: #1e2840;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: .06em;
    position: relative;
    z-index: 1;
}

</style></head><body><header><div class="eyebrow">NLP · ML · Deep Learning</div><h1>FAKE NEWS<br><em>DETECTOR</em></h1><p class="subtitle">Your AI-powered tool to distinguish fact from fiction in the news.</p><div class="divider"></div></header><main><div class="card"><div class="input-label">Paste the news article,
headline,
or text you want to check</div><textarea id="news-input" placeholder="e.g., Breaking News: Scientists discover a cure for cancer after secret government trials..."></textarea><div class="bottom-row"><span id="char-count">0 characters</span><button class="btn-analyze" id="analyze-btn" onclick="analyzeNews()"><div class="spin-ring"></div><span id="btn-label">Analyze News</span></button></div></div><div id="result"><div class="result-top" id="result-top"><div class="verdict" id="verdict-el"><div class="verdict-dot"></div><span id="verdict-label">–</span></div><div class="model-tag" id="model-tag"></div></div><div class="result-body" id="result-body"><div class="conf-row"><span>Confidence Score</span><span id="conf-pct">–</span></div><div class="conf-track"><div class="conf-bar" id="conf-bar"></div></div><p class="analysis-text" id="analysis-text">–</p><div class="tags" id="tags"></div></div></div></main><footer>ENSEMBLE · LOGISTIC REGRESSION+LSTM+BERT · KAGGLE DATASET</footer><script>const textarea=document.getElementById('news-input');
textarea.addEventListener('input', ()=> {
    const n=textarea.value.length;
    document.getElementById('char-count').textContent=n + ' character' + (n !==1 ? 's': '');
}

);
async function analyzeNews() {
    const text=textarea.value.trim();
    if (!text) {
        textarea.focus();
        return;
    }
    const btn=document.getElementById('analyze-btn');
    btn.disabled=true;
    btn.classList.add('spinning');
    try {
        const res=await fetch('http://127.0.0.1:5000/predict', {
            method: 'POST', headers: {
                'Content-Type': 'application/json'
            }
            , body: JSON.stringify( {
                text: text
            }
            )
        }
        );
        const data=await res.json();
        renderResult(data);
    }
    catch (err) {
        renderResult( {
            verdict: 'UNCERTAIN', confidence: 0, analysis: 'Server error: ' + err.message, indicators: []
        }
        );
    }
    finally {
        btn.disabled=false;
        btn.classList.remove('spinning');
    }
}

function renderResult(d) {
    const v=(d.verdict || 'UNCERTAIN').toUpperCase();
    const cls=v==='FAKE' ? 'fake': v==='REAL' ? 'real': 'uncertain';
    const conf=d.confidence || 0;
    const topEl=document.getElementById('result-top');
    const bodyEl=document.getElementById('result-body');
    const verdictEl=document.getElementById('verdict-el');
    ['fake',
    'real',
    'uncertain'].forEach(c=> {
        topEl.classList.remove(c);
        bodyEl.classList.remove(c);
        verdictEl.classList.remove(c);
    }
    );
    topEl.classList.add(cls);
    bodyEl.classList.add(cls);
    verdictEl.classList.add(cls);
    document.getElementById('verdict-label').textContent=v;
    document.getElementById('conf-pct').textContent=conf+'%';
    document.getElementById('analysis-text').textContent=d.analysis || '';
    document.getElementById('model-tag').textContent=v==='FAKE' ? '⚠ Misinformation Detected\nLR + LSTM + BERT Ensemble': v==='REAL' ? '✓ Appears Credible\nLR + LSTM + BERT Ensemble': '~ Inconclusive\nLR + LSTM + BERT Ensemble';
    const bar=document.getElementById('conf-bar');
    bar.className='conf-bar';
    bar.style.width='0';
    setTimeout(()=> {
        bar.style.width=conf + '%';
    }
    , 80);
    const tagsEl=document.getElementById('tags');
    tagsEl.innerHTML='';
    (d.indicators || []).forEach(ind=> {
        const s=document.createElement('span');
        s.className='tag ' + (ind.type || 'neutral');
        s.textContent=ind.label;
        tagsEl.appendChild(s);
    }
    );
    const resultEl=document.getElementById('result');
    resultEl.style.display='block';
    resultEl.scrollIntoView( {
        behavior: 'smooth', block: 'nearest'
    }
    );
}

</script></body></html>
